services:
  # 1. Outbound-Proxy (Tinyproxy) – whitelist-based for API access
  proxy:
    image: ghcr.io/querateam/docker-tinyproxy:latest
    container_name: openclaw_proxy
    read_only: true
    tmpfs:
      - /tmp
      - /run
    mem_limit: 64m
    volumes:
      - ./outbound-proxy/tinyproxy.conf:/etc/tinyproxy/tinyproxy.conf:ro
      - ./outbound-proxy/whitelist.txt:/etc/tinyproxy/whitelist.txt:ro
    networks:
      - openclaw_internal
      - openclaw_external
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8888 || true"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  # 2. SearXNG – self-hosted meta search engine
  searxng:
    image: searxng/searxng:latest
    container_name: openclaw_searxng
    restart: always
    read_only: true
    tmpfs:
      - /tmp
      - /run
    mem_limit: 256m
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro
      - ./searxng/limiter.toml:/etc/searxng/limiter.toml:ro
    environment:
      - SEARXNG_BASE_URL=http://searxng:8080/
    networks:
      - openclaw_internal
      - openclaw_external
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  # 3. Reader-Proxy – GET-only web page reader (no POST possible)
  reader:
    build: ./reader
    container_name: openclaw_reader
    restart: always
    read_only: true
    tmpfs:
      - /tmp
    mem_limit: 128m
    environment:
      - READER_PORT=3000
      - READER_TIMEOUT=15
    networks:
      - openclaw_internal
      - openclaw_external
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:3000/health')\""]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  # 4. DNS-Relay – whitelisted DNS only (blocks DNS exfiltration)
  dns:
    build: ./dns
    container_name: openclaw_dns
    restart: always
    read_only: true
    tmpfs:
      - /tmp
      - /var/run
    mem_limit: 32m
    volumes:
      - ./dns/entrypoint.sh:/entrypoint.sh:ro
      - ./outbound-proxy/whitelist.txt:/etc/dns-whitelist.txt:ro
    entrypoint: ["sh", "/entrypoint.sh"]
    healthcheck:
      test: ["CMD-SHELL", "echo test | nc -w1 127.0.0.1 53 >/dev/null 2>&1"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      openclaw_internal:
        ipv4_address: 172.28.0.253
      openclaw_external: {}

  # 5. Hermes AI Agent (default agent — replaces OpenClaw)
  # To use OpenClaw instead: docker compose -f docker-compose.yml -f docker-compose.openclaw.yml up -d
  hermes:
    build: ./hermes
    container_name: hermes_agent
    restart: always
    dns:
      - 172.28.0.253
    depends_on:
      proxy:
        condition: service_healthy
      searxng:
        condition: service_healthy
      reader:
        condition: service_healthy
      dns:
        condition: service_healthy
      clawroute:
        condition: service_healthy
      browserless:
        condition: service_healthy
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - FOWNER
      - SETGID
      - SETUID
      - DAC_OVERRIDE
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    mem_limit: 2g
    # Run in gateway mode (Telegram + API server), not interactive REPL
    command: ["gateway", "run"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:${HERMES_API_PORT:-8642}/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    tmpfs:
      - /tmp
    environment:
      # Hermes core
      - HERMES_HOME=/opt/data
      - HF_HOME=/opt/data/.cache/huggingface
      # Match host volume ownership (gosu remaps at runtime, avoids slow build-time chown)
      - HERMES_UID=1000
      - HERMES_GID=1000

      # Dashboard (web UI for config, sessions, analytics)
      - HERMES_DASHBOARD_ENABLED=true
      - HERMES_DASHBOARD_PORT=9119

      # API Server (replaces OpenClaw gateway)
      - API_SERVER_ENABLED=true
      - API_SERVER_PORT=${HERMES_API_PORT:-8642}
      - API_SERVER_HOST=0.0.0.0
      - API_SERVER_KEY=${HERMES_API_KEY:-changeme}

      # Agent behavior
      - HERMES_MAX_ITERATIONS=${HERMES_MAX_ITERATIONS:-90}

      # LLM Provider — ClawRoute as OpenAI-compatible endpoint
      - OPENAI_BASE_URL=http://clawroute:18790/v1
      - OPENAI_API_KEY=${CLAWROUTE_TOKEN}
      # Named custom provider key (config.yaml custom_providers[custom-1].api_key_env)
      - CUSTOM_1_API_KEY=${CLAWROUTE_TOKEN}

      # Browserless CDP
      - BROWSER_CDP_URL=http://browserless:3000

      # Node.js preload: CDP endpoint rewriting for Docker networking
      - NODE_OPTIONS=--require=/opt/hermes/bootstrap/cdp-patch.js

      # Proxy bootstrap Python (sitecustomize.py)
      - PYTHONPATH=/opt/hermes/bootstrap

      # SearXNG plugin
      - SEARXNG_INSTANCE_URL=http://searxng:8080

      # Outbound proxy
      - http_proxy=http://proxy:8888
      - https_proxy=http://proxy:8888
      - HTTP_PROXY=http://proxy:8888
      - HTTPS_PROXY=http://proxy:8888
      - NO_PROXY=localhost,127.0.0.1,::1,hermes,proxy,caddy,searxng,reader,clawroute,ollama,browserless
      - no_proxy=localhost,127.0.0.1,::1,hermes,proxy,caddy,searxng,reader,clawroute,ollama,browserless

      # Internal services
      - SEARXNG_URL=http://searxng:8080
      - READER_PROXY_URL=http://reader:3000

      # Telegram (see .env for HERMES_TELEGRAM_BOT_TOKEN)
      - TELEGRAM_BOT_TOKEN=${HERMES_TELEGRAM_BOT_TOKEN}
      - TELEGRAM_ALLOWED_USERS=${HERMES_TELEGRAM_ALLOWED_USERS}
      - TELEGRAM_BOT_TOKEN_COACH=${HERMES_TELEGRAM_BOT_TOKEN_COACH}
      - TELEGRAM_ALLOWED_USERS_COACH=${HERMES_TELEGRAM_ALLOWED_USERS_COACH}

      # Profile auto-start (comma-separated list of profiles to run alongside default)
      - HERMES_AUTOSTART_PROFILES=${HERMES_AUTOSTART_PROFILES:-coach}

      # GitHub
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_USERNAME=${GITHUB_USERNAME}
      - GITHUB_EMAIL=${GITHUB_EMAIL}

      # Raindrop (added for API access)
      - RAINDROP_API_KEY=${RAINDROP_API_KEY}

      # gogcli
      - GOG_KEYRING_BACKEND=file
      - GOG_KEYRING_PASSWORD=${GOG_KEYRING_PASSWORD:-}
    volumes:
      # Persistent Hermes data
      - ${HERMES_DATA_PATH:-./hermes-data}:/opt/data:Z
      # gogcli credentials
      - ${GOGCLI_DATA_PATH:-./gogcli}:/opt/data/.config/gogcli:Z
      # Proxy whitelist (read-only — agent cannot modify proxy rules)
      - ./outbound-proxy/whitelist.txt:/etc/proxy-whitelist.txt:ro
    networks:
      - openclaw_internal
    # Security: agent ONLY on internal network – no direct internet access.

  # 6. ClawRoute – LLM cost-routing proxy (routes between Ollama and remote APIs)
  clawroute:
    build:
      context: ..
      dockerfile: lobster-cage/clawroute/Dockerfile
    container_name: openclaw_clawroute
    restart: always
    mem_limit: 512m
    environment:
      - CLAWROUTE_HOST=0.0.0.0
      - CLAWROUTE_PORT=18790
      - CLAWROUTE_BASELINE_MODEL=${CLAWROUTE_BASELINE_MODEL:-openrouter/anthropic/claude-sonnet-4.6}
      - OLLAMA_ENDPOINT=${OLLAMA_ENDPOINT:-http://ollama:11434}
      - CLAWROUTE_TOKEN=${CLAWROUTE_TOKEN}
      - CLAWROUTE_DEBUG=${CLAWROUTE_DEBUG:-false}
      - CLAWROUTE_DRY_RUN=${CLAWROUTE_DRY_RUN:-false}
      - CLAWROUTE_LOG_CONTENT=${CLAWROUTE_LOG_CONTENT:-false}
      - CLAWROUTE_PROVIDER=${CLAWROUTE_PROVIDER:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_CODEX_AUTH_PATH=${OPENAI_CODEX_AUTH_PATH:-/app/codex-auth.json}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      # Route remote API calls through Tinyproxy (all API domains are whitelisted)
      - http_proxy=http://proxy:8888
      - https_proxy=http://proxy:8888
      - HTTP_PROXY=http://proxy:8888
      - HTTPS_PROXY=http://proxy:8888
      # Ollama and internal services bypass the proxy
      - NO_PROXY=localhost,127.0.0.1,::1,ollama,hermes,clawroute,proxy,caddy,searxng,reader,browserless
      - no_proxy=localhost,127.0.0.1,::1,ollama,hermes,clawroute,proxy,caddy,searxng,reader,browserless
    networks:
      - openclaw_internal
      # ClawRoute routes remote API calls through Tinyproxy (http_proxy env vars above).
      # All required API domains are in outbound-proxy/whitelist.txt.
      # No direct internet access needed — internal network only.
    healthcheck:
      test: ["CMD-SHELL", "cat /proc/net/tcp | grep :4966 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      proxy:
        condition: service_healthy
      # ollama:
      #   condition: service_healthy
    volumes:
      - ${CLAWROUTE_DATA_PATH:-./clawroute_data}:/app/data
      # Mount host codex auth.json for subscription access (read-only).
      # ClawRoute reads this at startup to get the OAuth token.
      # After `codex login` refreshes the file, just `docker compose restart clawroute`.
      - ${HOME}/.codex/auth.json:/app/codex-auth.json:ro

  # # 7. Ollama – local LLM inference (CPU-only; explicit model routing via ClawRoute)
  # ollama:
  #   image: alpine/ollama:latest
  #   container_name: openclaw_ollama
  #   restart: always
  #   mem_limit: 4g
  #   cap_drop:
  #     - ALL
  #   security_opt:
  #     - no-new-privileges:true
  #   environment:
  #     # Route model downloads through Tinyproxy (registry.ollama.ai is whitelisted)
  #     - http_proxy=http://proxy:8888
  #     - https_proxy=http://proxy:8888
  #     - HTTP_PROXY=http://proxy:8888
  #     - HTTPS_PROXY=http://proxy:8888
  #     - NO_PROXY=localhost,127.0.0.1,::1,0.0.0.0,ollama,hermes,clawroute,proxy,caddy,searxng,reader
  #     - no_proxy=localhost,127.0.0.1,::1,0.0.0.0,ollama,hermes,clawroute,proxy,caddy,searxng,reader
  #     # Bind to all interfaces so other containers (ClawRoute) can reach Ollama.
  #     - OLLAMA_HOST=0.0.0.0:11434
  #     # Default context window hint — the authoritative num_ctx is baked into the
  #     # model's Modelfile (see swap-ollama-model.sh). This env var is a fallback
  #     # for Ollama's native API path only; the OpenAI-compat endpoint ignores it.
  #     - OLLAMA_NUM_CTX=16384
  #   volumes:
  #     - ollama:/root/.ollama
  #   networks:
  #     - openclaw_internal
  #   healthcheck:
  #     test: ["CMD-SHELL", "cat /proc/net/tcp* | grep -i :2CAA >/dev/null || exit 1"]
  #     interval: 15s
  #     timeout: 5s
  #     retries: 5
  #     start_period: 30s

  # 9. Browserless — stealth headless Chromium (CDP endpoint for OpenClaw browser tool)
  browserless:
    image: ghcr.io/browserless/chromium:latest
    container_name: openclaw_browserless
    restart: always
    mem_limit: 1g
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - FOWNER
      - SETGID
      - SETUID
    security_opt:
      - no-new-privileges:true
    dns:
      - 172.28.0.253
    environment:
      # Browserless UI behavior
      - ENABLE_DEBUGGER=true
      - SCREEN_WIDTH=1280
      - SCREEN_HEIGHT=720
      # Chromium proxy flag — routes ALL browser traffic through Tinyproxy whitelist
      - DEFAULT_LAUNCH_ARGS=--proxy-server=http://proxy:8888 --disable-crash-reporter --no-crashpad
      # Standard proxy env vars (container-level HTTP, e.g. healthchecks)
      - http_proxy=http://proxy:8888
      - https_proxy=http://proxy:8888
      - HTTP_PROXY=http://proxy:8888
      - HTTPS_PROXY=http://proxy:8888
      - NO_PROXY=localhost,127.0.0.1,::1,browserless,hermes,proxy,caddy,searxng,reader,clawroute
      - no_proxy=localhost,127.0.0.1,::1,browserless,hermes,proxy,caddy,searxng,reader,clawroute
    networks:
      - openclaw_internal
    # Security: browserless ONLY on internal network — no direct internet.
    # Whitelisted DNS relay (172.28.0.253) + Tinyproxy (proxy:8888) enforce access control.
    depends_on:
      proxy:
        condition: service_healthy
      dns:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/json/version || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  # 8. Inbound HTTPS reverse proxy (Caddy)
  caddy:
    image: caddy:alpine
    container_name: openclaw_caddy
    restart: always
    read_only: true
    tmpfs:
      - /tmp
      - /run
      - /config/caddy
      - /data/caddy
    mem_limit: 64m
    ports:
      - "${OPENCLAW_PORT:-18789}:${OPENCLAW_PORT:-18789}"
      - "${CLAWROUTE_PORT:-18790}:${CLAWROUTE_PORT:-18790}"
      - "3005:3005"
      - "8787:8787"
      - "3199:3199"
      - "9119:9119"
    env_file:
      - caddy/caddy.env
    environment:
      - CADDY_AUTH_USER=${CADDY_AUTH_USER:-admin}
      - OPENCLAW_PORT=${OPENCLAW_PORT:-18789}
      - CLAWROUTE_PORT=${CLAWROUTE_PORT:-18790}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy/portal.html:/srv/portal.html:ro
      - ./certs:/certs:ro
    networks:
      - openclaw_internal
      - openclaw_external
    depends_on:
      - hermes

networks:
  openclaw_internal:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.28.0.0/24
  openclaw_external:
    driver: bridge

