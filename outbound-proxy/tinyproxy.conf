# --- Tinyproxy-Konfiguration (Outbound-Whitelist-Proxy) ---
User nobody
Group nogroup
Port 8888
Timeout 600

# Nur Verbindungen aus dem Docker-internen Netzwerk erlauben
Allow 172.28.0.0/24

# Whitelist / Filter-Einstellungen
Filter "/etc/tinyproxy/whitelist.txt"
FilterURLs On
FilterExtended Off
FilterDefaultDeny Yes

# Logging
LogLevel Info

